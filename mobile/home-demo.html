<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>中南迎新服务 · 首页</title>
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
<link rel="stylesheet" href="../assets/mobile.css" />
</head>
<body>
<div class="phone-wrap" style="background:#F5F8FC">
  <div class="home-banner">
    <div class="status-bar" style="position:relative;z-index:2">
      <span>9:41</span>
      <div class="icons"><i class="hgi-stroke hgi-signal-full-01"></i><i class="hgi-stroke hgi-wifi-01"></i><i class="hgi-stroke hgi-battery-full"></i></div>
    </div>
    <div style="position:absolute;top:48px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:center;z-index:2;color:#fff">
      <div style="font-size:15px;font-weight:600">中南迎新服务</div>
      <div class="m-capsule"><i class="hgi-stroke hgi-more-horizontal"></i><span></span><i class="hgi-stroke hgi-cancel-01"></i></div>
    </div>
    <div class="banner-title">
      <h1>你好，新同学</h1>
      <p>Hello, New Classmate</p>
    </div>
    <div class="msg-btn"><i class="hgi-stroke hgi-notification-01"></i> 消息中心</div>
    <div class="notice">
      <i class="hgi-stroke hgi-notification-01"></i>
      <span>关于启动新生报到工作的通知</span>
    </div>
  </div>

  <div class="quick-row">
    <div class="quick-card pink">
      <h3>预报到</h3>
      <p>入学报到前需办理</p>
    </div>
    <div class="quick-card blue">
      <h3>到校报到</h3>
      <p>新生指引办理入学</p>
    </div>
  </div>

  <div class="progress-sec">
    <div class="ph">
      <h3>办理进度 <span style="color:#DF2027;font-size:13px">迎新一次办</span></h3>
      <span class="cnt">0 / 2</span>
    </div>
    <div class="progress-bar"><div class="fill" style="width:0"></div></div>
  </div>

  <div class="task-list">
    <div style="font-size:13px;color:var(--text-3);margin:4px 0 10px;font-weight:600">预报到环节</div>

    <!-- 新增：特长信息 -->
    <a class="task-card" href="talent-collect.html" style="color:inherit">
      <div class="ico" style="background:linear-gradient(135deg,#AB47BC,#7B1FA2)"><i class="hgi-stroke hgi-music-note-01"></i></div>
      <div class="body">
        <div class="t">特长信息采集 <span class="tag tag-opt">选填</span> <span class="tag tag-online">线上</span></div>
        <div class="d">截止日期：2026-08-30 18:00</div>
      </div>
      <i class="hgi-stroke hgi-arrow-right-01 arrow"></i>
    </a>

    <!-- 新增：服役经历登记 -->
    <a class="task-card" href="service-register.html" style="color:inherit">
      <div class="ico" style="background:linear-gradient(135deg,#E53935,#C62828)"><i class="hgi-stroke hgi-shield-01"></i></div>
      <div class="body">
        <div class="t">服役经历登记 <span class="tag tag-req">必填</span> <span class="tag tag-online">线上</span></div>
        <div class="d">截止日期：2026-08-30 18:00</div>
      </div>
      <i class="hgi-stroke hgi-arrow-right-01 arrow"></i>
    </a>

  </div>

  <nav class="tabbar">
    <a class="active" href="home-demo.html">
      <div class="dot-wrap"><i class="hgi-stroke hgi-home-01"></i></div>
      首页
    </a>
    <a href="#"><i class="hgi-stroke hgi-favourite"></i>新生服务</a>
    <a href="#"><i class="hgi-stroke hgi-maps-location-01"></i>校园导览</a>
    <a href="#"><i class="hgi-stroke hgi-file-01"></i>报到单</a>
  </nav>
</div>
</body>
</html>
