<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>提交成功 · 特长信息</title>
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
<link rel="stylesheet" href="../assets/mobile.css" />
</head>
<body>
<div class="phone-wrap">
  <div class="m-header">
    <div class="status-bar">
      <span>9:41</span>
      <div class="icons"><i class="hgi-stroke hgi-signal-full-01"></i><i class="hgi-stroke hgi-wifi-01"></i><i class="hgi-stroke hgi-battery-full"></i></div>
    </div>
    <div class="m-header-bar">
      <a class="back" href="home-demo.html"><i class="hgi-stroke hgi-arrow-left-01"></i></a>
      <div class="title">特长信息采集</div>
      <div class="m-capsule"><i class="hgi-stroke hgi-more-horizontal"></i><span></span><i class="hgi-stroke hgi-cancel-01"></i></div>
    </div>
  </div>
  <div class="success-wrap">
    <div class="success-icon"><i class="hgi-stroke hgi-tick-02"></i></div>
    <h2>提交成功</h2>
    <p>您的特长信息已提交，可在办理进度中查看状态。<br/>如需修改，可再次进入本环节编辑。</p>
    <div style="display:flex;flex-direction:column;gap:12px;max-width:280px;margin:0 auto">
      <a class="btn btn-primary" href="home-demo.html" style="text-decoration:none">返回首页</a>
      <a class="btn btn-ghost" href="talent-collect.html" style="text-decoration:none">继续编辑</a>
    </div>
  </div>
</div>
