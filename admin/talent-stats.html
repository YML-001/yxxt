<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>特长信息统计 · 数字迎新</title>
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
<style>
/* tokens.css + layout.css (内联) */
:root {
  --primary: #3087CC;
  --primary-light: #E3F1F9;
  --primary-dark: #006DAD;
  --primary-border: #BADEF3;
  --brand-red: #DF2027;
  --success: #1BB975;
  --success-bg: #E8FCF4;
  --success-border: #A7F3D0;
  --warning: #F29100;
  --warning-bg: #FFF5E5;
  --warning-border: #FFE0B3;
  --danger: #DF2027;
  --danger-bg: #FCE8EA;
  --danger-border: #F6BCBE;
  --text: #3C444F;
  --text-2: #696F7D;
  --text-3: #9096A2;
  --placeholder: #ABB0BA;
  --border: #C8CAD1;
  --border-light: #ECEFF4;
  --bg: #F5F7FA;
  --card: #FFFFFF;
  --table-header-bg: #E3F1F9;
  --font-family: 'OPPOSans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 4px 12px rgba(0, 0, 0, 0.08);
  --sidebar-width: 240px;
  --header-height: 56px;
  --transition: 150ms ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-family);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a { text-decoration: none; color: inherit; }

.hgi-stroke { display: inline-block; line-height: 1; vertical-align: -0.125em; }

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: var(--sidebar-width);
  background: var(--card);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
}

.side-brand {
  height: var(--header-height);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-light);
  font-weight: 700;
  font-size: 15px;
}

.side-brand .logo {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.side-brand .sb-sub { font-size: 11px; font-weight: 400; color: var(--text-3); margin-top: 1px; }

.side-nav { flex: 1; overflow-y: auto; padding: 12px 10px; }

.side-group {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  padding: 12px 10px 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  color: var(--text-2);
  font-size: 14px;
  transition: background var(--transition), color var(--transition);
  margin-bottom: 2px;
}

.nav-item:hover { background: var(--primary-light); color: var(--primary); }

.nav-item.active {
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

.nav-item .ni-ico { width: 18px; text-align: center; font-size: 16px; }

.side-foot {
  padding: 14px 16px;
  border-top: 1px solid var(--border-light);
  font-size: 13px;
  color: var(--text-3);
}

.side-foot a:hover { color: var(--primary); }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  height: var(--header-height);
  background: var(--card);
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}

.crumb { font-size: 13px; color: var(--text-3); }
.crumb a:hover { color: var(--primary); }

.topbar-right { display: flex; align-items: center; gap: 12px; }

.role-switch {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 3px;
  gap: 2px;
}

.role-switch button {
  border: none;
  background: transparent;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-2);
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}

.role-switch button.active {
  background: var(--card);
  color: var(--primary);
  font-weight: 600;
  box-shadow: var(--shadow-sm);
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-2);
}

.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
}

.content { flex: 1; padding: 20px 24px 32px; overflow-x: auto; }

.page-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.page-head h1 { font-size: 20px; font-weight: 700; color: var(--text); }

.page-head .desc { font-size: 13px; color: var(--text-3); margin-top: 4px; }

.page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 40px;
  padding: 0 16px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-sm { height: 32px; padding: 0 12px; font-size: 13px; }

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }

.btn-secondary {
  background: var(--card);
  color: var(--primary);
  border-color: var(--primary);
}
.btn-secondary:hover { background: var(--primary-light); }

.btn-danger {
  background: var(--card);
  color: var(--danger);
  border-color: var(--danger-border);
}
.btn-danger:hover { background: var(--danger-bg); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--bg); }

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.scope-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--primary-light);
  border: 1px solid var(--primary-border);
  border-radius: var(--radius-md);
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--primary-dark);
}

.scope-banner i { font-size: 16px; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-sm);
}

.stat-card .label { font-size: 12px; color: var(--text-3); }
.stat-card .value { font-size: 24px; font-weight: 700; color: var(--primary); margin-top: 4px; font-variant-numeric: tabular-nums; }

.filter-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}

.filter-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px 16px;
}

.filter-item label {
  display: block;
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 6px;
}

.filter-item input,
.filter-item select,
.filter-item textarea {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: var(--card);
}

.filter-item textarea { height: auto; min-height: 80px; padding: 10px 12px; resize: vertical; }

.filter-item input:focus,
.filter-item select:focus,
.filter-item textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(48, 135, 204, 0.15);
}

.filter-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border-light);
}

.table-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.table-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-light);
  gap: 12px;
  flex-wrap: wrap;
}

.table-toolbar .left { display: flex; align-items: center; gap: 12px; }

.table-wrap { overflow-x: auto; }

table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 960px;
}

table.data-table thead th {
  background: var(--table-header-bg);
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--text);
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
}

table.data-table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-2);
  vertical-align: middle;
}

table.data-table tbody tr:hover { background: #FAFCFE; }
table.data-table tbody tr:last-child td { border-bottom: none; }

table.data-table .col-check { width: 44px; text-align: center; }
table.data-table .col-actions { white-space: nowrap; }

.checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--primary);
  cursor: pointer;
}

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
}

.tag-ok { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
.tag-warn { background: var(--warning-bg); color: var(--warning); border-color: var(--warning-border); }
.tag-info { background: var(--primary-light); color: var(--primary); border-color: var(--primary-border); }

.btn-link {
  color: var(--primary);
  font-size: 13px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  padding: 0 4px;
}

.btn-link:hover { text-decoration: underline; }
.btn-link.danger { color: var(--danger); }

.table-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--border-light);
  font-size: 13px;
  color: var(--text-3);
  flex-wrap: wrap;
  gap: 12px;
}

.pagination { display: flex; gap: 4px; }

.pagination button {
  min-width: 32px;
  height: 32px;
  border: 1px solid var(--border-light);
  background: var(--card);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  color: var(--text-2);
}

.pagination button.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.form-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}

.form-section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-light);
}

.form-section:last-child { border-bottom: none; }

.form-section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-section-title::before {
  content: '';
  width: 3px;
  height: 16px;
  background: var(--primary);
  border-radius: 2px;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px 20px;
}

.form-grid.col-2 { grid-template-columns: repeat(2, 1fr); }
.form-grid .span-2 { grid-column: span 2; }
.form-grid .span-3 { grid-column: span 3; }

.form-field label {
  display: block;
  font-size: 13px;
  color: var(--text-2);
  margin-bottom: 6px;
}

.form-field label .req { color: var(--danger); margin-left: 2px; }

.form-field input,
.form-field select,
.form-field textarea {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
}

.form-field textarea { height: auto; min-height: 100px; padding: 10px 12px; resize: vertical; }

.form-footer {
  padding: 16px 24px;
  background: var(--bg);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.import-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}

.step-card {
  background: var(--card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 20px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.step-card .num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  margin: 0 auto 10px;
}

.step-card h3 { font-size: 14px; margin-bottom: 6px; }
.step-card p { font-size: 12px; color: var(--text-3); }

.upload-zone {
  border: 2px dashed var(--primary-border);
  border-radius: var(--radius-md);
  padding: 40px 24px;
  text-align: center;
  background: var(--primary-light);
  cursor: pointer;
  transition: border-color var(--transition);
}

.upload-zone:hover { border-color: var(--primary); }

.upload-zone i { font-size: 36px; color: var(--primary); margin-bottom: 12px; }

.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px 24px;
}

.detail-item .label { font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
.detail-item .value { font-size: 14px; color: var(--text); word-break: break-word; }
.detail-item.span-3 { grid-column: span 3; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(60, 68, 79, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal {
  background: var(--card);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 420px;
  overflow: hidden;
}

.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-light);
  font-size: 16px;
  font-weight: 700;
}

.modal-body { padding: 20px; font-size: 14px; color: var(--text-2); line-height: 1.7; }

.modal-footer {
  padding: 12px 20px 16px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.hidden { display: none !important; }

.text-muted { color: var(--text-3); }
.text-truncate {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

@media (max-width: 1200px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .filter-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 900px) {
  .sidebar { display: none; }
  .stats-row { grid-template-columns: 1fr; }
  .filter-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .span-2, .form-grid .span-3 { grid-column: span 1; }
  .import-steps { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .detail-item.span-3 { grid-column: span 1; }
}

</style>
<style>

.yx-sidebar .nav-item i { font-size: 16px; width: 18px; text-align: center; }
.yx-sidebar .group {

.yx-sidebar .foot {

.yx-sidebar .foot a:hover { color: var(--primary); }

.yx-main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
.yx-main .content { flex: 1; padding: 20px 24px 32px; overflow: auto; }

.status-dot {

.status-dot::before {

.status-dot.done { color: var(--success); }
.status-dot.done::before { background: var(--success); }

.avatar-cell {
  display: flex; align-items: center; gap: 8px;

.avatar-cell .av {

  display: flex; align-items: center; justify-content: center;

.detail-profile {
  display: flex; gap: 20px; align-items: flex-start;
  margin-bottom: 8px;

.detail-profile .photo {
  width: 88px; height: 110px; border-radius: 8px;

<script>
var colors = ['#3087CC', '#9CBFDA', '#1BB975', '#F29100', '#DF2027', '#006DAD'];

var catChart = echarts.init(document.getElementById('chartCat'));
catChart.setOption({
  color: colors,
  tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
  legend: { bottom: 0, textStyle: { color: '#696F7D' } },
  series: [{
    type: 'pie', radius: ['42%', '68%'],
    label: { formatter: '{b}\n{d}%' },
    data: [
      { name: '声乐', value: 312 },
      { name: '西洋乐器', value: 486 },
      { name: '中国乐器', value: 278 },
      { name: '舞蹈', value: 356 },
      { name: '语言艺术', value: 401 },
      { name: '其他', value: 208 }
    ]
  }]
});

var profChart = echarts.init(document.getElementById('chartProf'));
profChart.setOption({
  color: ['#3087CC', '#F29100', '#1BB975'],
  tooltip: { trigger: 'item' },
  legend: { bottom: 0 },
  series: [{
    type: 'pie', radius: '65%',
    data: [
      { name: '了解', value: 986 },
      { name: '熟练', value: 688 },
      { name: '精通', value: 367 }
    ]
  }]
});

var barChart = echarts.init(document.getElementById('chartBar'));
barChart.setOption({
  color: ['#3087CC', '#F29100', '#1BB975'],
  tooltip: { trigger: 'axis' },
  legend: { data: ['了解', '熟练', '精通'], top: 0 },
  grid: { left: 40, right: 20, bottom: 40, top: 40 },
  xAxis: { type: 'category', data: ['声乐', '西洋乐器', '中国乐器', '舞蹈', '语言艺术', '其他'] },
  yAxis: { type: 'value' },
  series: [
    { name: '了解', type: 'bar', barGap: '20%', data: [168, 210, 132, 156, 198, 122] },
    { name: '熟练', type: 'bar', data: [98, 176, 96, 128, 132, 58] },
    { name: '精通', type: 'bar', data: [46, 100, 50, 72, 71, 28] }
  ]
});

window.addEventListener('resize', function(){
  catChart.resize(); profChart.resize(); barChart.resize();
});
</script>
