<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>特长信息采集 · 中南迎新</title>
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
<link rel="stylesheet" href="../assets/mobile.css" />
</head>
<body>
<div class="phone-wrap">
  <div class="m-header">
    <div class="status-bar">
      <span>9:41</span>
      <div class="icons"><i class="hgi-stroke hgi-signal-full-01"></i><i class="hgi-stroke hgi-wifi-01"></i><i class="hgi-stroke hgi-battery-full"></i></div>
    </div>
    <div class="m-header-bar">
      <a class="back" href="home-demo.html"><i class="hgi-stroke hgi-arrow-left-01"></i></a>
      <div class="title">特长信息采集</div>
      <div class="m-capsule"><i class="hgi-stroke hgi-more-horizontal"></i><span></span><i class="hgi-stroke hgi-cancel-01"></i></div>
    </div>
  </div>

  <div class="m-body">
    <div class="m-card">
      <div class="m-card-title">基本信息</div>
      <div class="field-row"><span class="label">姓名</span><span class="value">张三</span></div>
      <div class="field-row"><span class="label">学院</span><span class="value">计算机学院</span></div>
      <div class="field-row"><span class="label">专业</span><span class="value">软件工程</span></div>
      <div class="field-row"><span class="label">学号</span><span class="value">2026010123</span></div>
    </div>

    <div class="m-card">
      <div class="m-card-title">
        <span>特长信息 <span style="font-size:12px;font-weight:400;color:var(--text-3)">（1~50 条）</span></span>
        <span id="countBadge" class="tag tag-opt">0 条</span>
      </div>
      <div id="talentList"></div>
      <div id="emptyTip" class="empty-tip">暂无特长记录，请点击下方按钮添加</div>
      <button type="button" class="btn-add" id="btnAdd" onclick="openSheet()">
        <i class="hgi-stroke hgi-add-01"></i> 添加一条特长
      </button>
      <p class="hint-text">可填写多项特长；提交时至少 1 条（选填环节可跳过）。若所选类别为“其他”，请填写具体特长名称。</p>
    </div>
  </div>

  <div class="m-footer">
    <button type="button" class="btn btn-ghost" onclick="location.href='home-demo.html'">暂存</button>
    <button type="button" class="btn btn-primary" id="btnSubmit" onclick="submitForm()">提交</button>
  </div>
</div>

<!-- 添加/编辑弹层 -->
<div class="sheet-mask" id="sheetMask">
  <div class="sheet">
    <div class="sheet-head">
      <h3 id="sheetTitle">添加一条特长</h3>
      <button type="button" class="close" onclick="closeSheet()"><i class="hgi-stroke hgi-cancel-01"></i></button>
    </div>
    <div class="sheet-body">
      <div class="field-block">
        <div class="label"><span class="req">*</span>特长类别</div>
        <input class="cascade-search" id="catSearch" placeholder="请输入关键词搜索" oninput="filterCats()" />
        <div class="cascade-cols">
          <div class="cascade-col" id="level1List"></div>
          <div class="cascade-col" id="level2List"></div>
        </div>
        <p id="catHint" style="font-size:12px;color:var(--danger);margin-top:8px;display:none">此题为必填，请逐级选至末级</p>
        <p id="catSelected" style="font-size:13px;color:var(--primary);margin-top:8px;display:none"></p>
      </div>
      <div class="field-block hidden" id="customBlock">
        <div class="label"><span class="req">*</span>具体特长（其他）</div>
        <input class="cascade-search" id="customInput" placeholder="选择“其他”时请填写具体特长名称" style="margin-bottom:0" maxlength="30" />
        <p style="font-size:12px;color:var(--text-3);margin-top:6px">未在预设列表中的特长，请在此填写，管理端可查看该内容。</p>
      </div>
      <div class="field-block">
        <div class="label"><span class="req">*</span>熟练程度</div>
        <div class="chip-group" id="profGroup"></div>
      </div>
    </div>
    <div class="sheet-foot">
      <button type="button" class="btn btn-ghost" onclick="closeSheet()">取消</button>
      <button type="button" class="btn btn-primary" onclick="confirmSheet()">确认</button>
    </div>
  </div>
</div>

<script src="../assets/talent-dict.js"></script>
<script>
var records = [
  { l1: '声乐', l2: '民族', prof: '了解', custom: '' },
  { l1: '舞蹈', l2: '其他', prof: '熟练', custom: '街舞' }
];
var editIndex = -1;
var selL1 = '', selL2 = '', selProf = '';

function lvTag(p) {
  if (p === '精通') return 'tag-lv3';
  if (p === '熟练') return 'tag-lv2';
  return 'tag-lv1';
}

function catLabel(r) {
  if (r.l2 === '其他' && r.custom) return r.l1 + ' / 其他（' + r.custom + '）';
  return r.l1 + ' / ' + r.l2;
}

function syncCustomBlock() {
  var block = document.getElementById('customBlock');
  if (selL2 === '其他') {
    block.classList.remove('hidden');
  } else {
    block.classList.add('hidden');
    document.getElementById('customInput').value = '';
  }
}

function renderList() {
  var list = document.getElementById('talentList');
  var empty = document.getElementById('emptyTip');
  var badge = document.getElementById('countBadge');
  var btnAdd = document.getElementById('btnAdd');
  badge.textContent = records.length + ' 条';
  btnAdd.disabled = records.length >= 50;
  if (!records.length) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = records.map(function (r, i) {
    return '<div class="talent-item">' +
      '<div class="info" onclick="editItem(' + i + ')">' +
        '<div class="name">' + catLabel(r) + '</div>' +
        '<div class="meta"><span class="tag ' + lvTag(r.prof) + '">' + r.prof + '</span></div>' +
      '</div>' +
      '<button type="button" class="del" onclick="removeItem(' + i + ')" title="删除"><i class="hgi-stroke hgi-delete-02"></i></button>' +
    '</div>';
  }).join('');
}

function openSheet(idx) {
  editIndex = (typeof idx === 'number') ? idx : -1;
  document.getElementById('sheetTitle').textContent = editIndex >= 0 ? '编辑特长' : '添加一条特长';
  var customVal = '';
  if (editIndex >= 0) {
    selL1 = records[editIndex].l1;
    selL2 = records[editIndex].l2;
    selProf = records[editIndex].prof;
    customVal = records[editIndex].custom || '';
  } else {
    selL1 = Object.keys(TALENT_DICT)[0];
    selL2 = '';
    selProf = '';
  }
  document.getElementById('catSearch').value = '';
  document.getElementById('catHint').style.display = 'none';
  renderLevel1();
  renderLevel2();
  renderProf();
  updateCatSelected();
  syncCustomBlock();
  document.getElementById('customInput').value = customVal;
  document.getElementById('sheetMask').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheetMask').classList.remove('show');
}

function editItem(i) { openSheet(i); }

function removeItem(i) {
  if (!confirm('确定删除该特长记录？')) return;
  records.splice(i, 1);
  renderList();
}

function renderLevel1() {
  var kw = (document.getElementById('catSearch').value || '').trim();
  var html = '';
  Object.keys(TALENT_DICT).forEach(function (k) {
    if (kw && k.indexOf(kw) < 0 && !TALENT_DICT[k].some(function (x) { return x.indexOf(kw) >= 0; })) return;
    html += '<div class="cascade-opt' + (selL1 === k ? ' active' : '') + '" onclick="pickL1(\'' + k + '\')">' +
      k + '<i class="hgi-stroke hgi-arrow-right-01 arrow"></i></div>';
  });
  document.getElementById('level1List').innerHTML = html || '<div class="empty-tip">无匹配类别</div>';
}

function renderLevel2() {
  var kw = (document.getElementById('catSearch').value || '').trim();
  var items = TALENT_DICT[selL1] || [];
  var html = '';
  items.forEach(function (k) {
    if (kw && k.indexOf(kw) < 0 && selL1.indexOf(kw) < 0) return;
    html += '<div class="cascade-opt' + (selL2 === k ? ' active' : '') + '" onclick="pickL2(\'' + k + '\')">' + k + '</div>';
  });
  document.getElementById('level2List').innerHTML = html || '<div class="empty-tip">请选择一级类别</div>';
}

function pickL1(k) {
  selL1 = k;
  selL2 = '';
  renderLevel1();
  renderLevel2();
  updateCatSelected();
  syncCustomBlock();
}

function pickL2(k) {
  selL2 = k;
  renderLevel2();
  updateCatSelected();
  syncCustomBlock();
  document.getElementById('catHint').style.display = 'none';
}

function updateCatSelected() {
  var el = document.getElementById('catSelected');
  if (selL1 && selL2) {
    el.style.display = '';
    el.textContent = '已选：' + selL1 + ' / ' + selL2;
  } else {
    el.style.display = 'none';
  }
}

function filterCats() {
  renderLevel1();
  renderLevel2();
}

function renderProf() {
  document.getElementById('profGroup').innerHTML = PROFICIENCY_OPTIONS.map(function (o) {
    return '<div class="chip-option' + (selProf === o.value ? ' active' : '') + '" onclick="pickProf(\'' + o.value + '\')">' +
      '<div class="dot"></div><div><div class="t">' + o.value + '</div><div class="d">' + o.desc + '</div></div></div>';
  }).join('');
}

function pickProf(v) {
  selProf = v;
  renderProf();
}

function confirmSheet() {
  if (!selL1 || !selL2) {
    document.getElementById('catHint').style.display = '';
    return;
  }
  var custom = (document.getElementById('customInput').value || '').trim();
  if (selL2 === '其他' && !custom) {
    alert('选择“其他”时请填写具体特长名称');
    return;
  }
  if (!selProf) {
    alert('请选择熟练程度');
    return;
  }
  var item = { l1: selL1, l2: selL2, prof: selProf, custom: selL2 === '其他' ? custom : '' };
  if (editIndex >= 0) records[editIndex] = item;
  else {
    if (records.length >= 50) { alert('最多可添加 50 条'); return; }
    records.push(item);
  }
  closeSheet();
  renderList();
}

function submitForm() {
  if (!records.length) {
    if (!confirm('尚未添加特长记录。特长信息为选填，确认提交空记录？')) return;
  }
  location.href = 'talent-success.html';
}

renderList();
</script>
</body>
</html>
