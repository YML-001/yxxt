<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>特长信息统计 · 数字迎新</title>
<link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css" />
<link rel="stylesheet" href="../assets/layout.css" />
<link rel="stylesheet" href="../assets/admin.css" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
<div class="yx-app">
  <header class="yx-topnav">
    <div class="brand"><span class="logo">中</span>中南大学数字迎新</div>
    <nav class="nav-links">
      <a href="#">首页</a>
      <a href="#">审批事项</a>
      <a href="#">迎新准备</a>
      <a class="active" href="status.html">迎新环节管理</a>
      <a href="#">系统基础配置</a>
      <a href="#">迎新统计查询</a>
      <a href="#">迎新大屏</a>
    </nav>
    <div class="right">
      <span class="bell"><i class="hgi-stroke hgi-notification-01"></i><span class="badge">2</span></span>
      <span>管理员</span>
    </div>
  </header>
  <div class="yx-body">
    <aside class="yx-sidebar">
      <div class="search"><input type="text" placeholder="菜单搜索..." /></div>
      <nav class="nav">
        <a class="nav-item" href="status.html"><i class="hgi-stroke hgi-task-01"></i>环节办理情况</a>
        <div class="group">新生信息采集</div>
        <a class="nav-item" href="talent-list.html"><i class="hgi-stroke hgi-music-note-01"></i>特长信息</a>
        <a class="nav-item" href="service-list.html"><i class="hgi-stroke hgi-shield-01"></i>服役经历登记</a>
        <a class="nav-item active" href="talent-stats.html"><i class="hgi-stroke hgi-pie-chart"></i>特长信息统计</a>
      </nav>
      <div class="foot"><a href="../index.html"><i class="hgi-stroke hgi-arrow-left-02"></i> 返回原型导航</a></div>
    </aside>
    <div class="yx-main">
      <div class="content">
        <div class="page-head">
          <div>
            <h1>特长信息统计</h1>
            <p class="desc">按大类与熟练程度分布统计（原型示例数据）</p>
          </div>
          <div class="page-actions">
            <a class="btn btn-ghost" href="talent-list.html"><i class="hgi-stroke hgi-table"></i> 返回列表</a>
            <button type="button" class="btn btn-secondary" onclick="alert('原型：导出统计报表')"><i class="hgi-stroke hgi-download-01"></i> 导出</button>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-card"><div class="label">已采集人数</div><div class="value">1,286</div></div>
          <div class="stat-card"><div class="label">特长条数</div><div class="value">2,041</div></div>
          <div class="stat-card"><div class="label">人均特长数</div><div class="value">1.6</div></div>
          <div class="stat-card"><div class="label">覆盖率</div><div class="value">75.7%</div></div>
        </div>

        <div class="chart-row">
          <div class="chart-card">
            <h3>特长大类分布</h3>
            <div class="chart-box" id="chartCat"></div>
          </div>
          <div class="chart-card">
            <h3>熟练程度分布</h3>
            <div class="chart-box" id="chartProf"></div>
          </div>
        </div>

        <div class="chart-card">
          <h3>各大类 · 熟练程度交叉（柱状图）</h3>
          <div class="chart-box" id="chartBar" style="height:320px"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
var colors = ['#3087CC', '#9CBFDA', '#1BB975', '#F29100', '#DF2027', '#006DAD'];

var catChart = echarts.init(document.getElementById('chartCat'));
catChart.setOption({
  color: colors,
  tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
  legend: { bottom: 0, textStyle: { color: '#696F7D' } },
  series: [{
    type: 'pie', radius: ['42%', '68%'],
    label: { formatter: '{b}\n{d}%' },
    data: [
      { name: '声乐', value: 312 },
      { name: '西洋乐器', value: 486 },
      { name: '中国乐器', value: 278 },
      { name: '舞蹈', value: 356 },
      { name: '语言艺术', value: 401 },
      { name: '其他', value: 208 }
    ]
  }]
});

var profChart = echarts.init(document.getElementById('chartProf'));
profChart.setOption({
  color: ['#3087CC', '#F29100', '#1BB975'],
  tooltip: { trigger: 'item' },
  legend: { bottom: 0 },
  series: [{
    type: 'pie', radius: '65%',
    data: [
      { name: '了解', value: 986 },
      { name: '熟练', value: 688 },
      { name: '精通', value: 367 }
    ]
  }]
});

var barChart = echarts.init(document.getElementById('chartBar'));
barChart.setOption({
  color: ['#3087CC', '#F29100', '#1BB975'],
  tooltip: { trigger: 'axis' },
  legend: { data: ['了解', '熟练', '精通'], top: 0 },
  grid: { left: 40, right: 20, bottom: 40, top: 40 },
  xAxis: { type: 'category', data: ['声乐', '西洋乐器', '中国乐器', '舞蹈', '语言艺术', '其他'] },
  yAxis: { type: 'value' },
  series: [
    { name: '了解', type: 'bar', barGap: '20%', data: [168, 210, 132, 156, 198, 122] },
    { name: '熟练', type: 'bar', data: [98, 176, 96, 128, 132, 58] },
    { name: '精通', type: 'bar', data: [46, 100, 50, 72, 71, 28] }
  ]
});

window.addEventListener('resize', function(){
  catChart.resize(); profChart.resize(); barChart.resize();
});
</script>
</body>
</html>
